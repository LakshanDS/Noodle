<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="color-scheme" content="dark light">
<title>Noodle</title>
<style>
  /* Mobile-first: dark theme by default, large tap targets, system fonts.
     No build step — plain CSS, no framework. Layout uses 100dvh + sticky
     header/footer so the message list scrolls on its own. */
  :root {
    --bg: #0d1117;
    --bg-elev: #161b22;
    --bg-elev2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #2f81f7;
    --ok: #3fb950;
    --fail: #f85149;
    --running: #d29922;
    --none: #8b949e;
    --bubble-user: #1f6feb;
    --bubble-bot: #21262d;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --bg-elev: #f6f8fa;
      --bg-elev2: #eaeef2;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #636c76;
      --bubble-bot: #f0f3f6;
      --bubble-user: #2f81f7;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  body { min-height: 100dvh; }
  button, input { font: inherit; color: inherit; }
  button { cursor: pointer; }
  .hidden { display: none !important; }

  /* ---------- App shell ---------- */
  #app { display: flex; flex-direction: column; height: 100dvh; }

  .topbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: calc(8px + var(--safe-top)) 12px 8px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    min-height: calc(52px + var(--safe-top));
  }
  .topbar .title { font-weight: 600; font-size: 16px; flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar .emoji { font-size: 20px; }
  .topbar .sub { font-size: 12px; color: var(--text-dim); font-weight: 400; }
  .icon-btn {
    flex: 0 0 auto; width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    font-size: 18px; color: var(--text);
  }
  .icon-btn:active { background: var(--bg-elev2); }

  .scroll {
    flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(16px + var(--safe-bottom));
  }

  /* ---------- Login ---------- */
  #login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; padding: 24px; }
  .login-card {
    width: 100%; max-width: 360px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 22px; text-align: center;
  }
  .login-card .logo { font-size: 44px; margin-bottom: 8px; }
  .login-card h1 { margin: 0 0 4px; font-size: 22px; }
  .login-card p { margin: 0 0 20px; color: var(--text-dim); font-size: 14px; }
  .login-card input {
    width: 100%; padding: 13px 14px; margin-bottom: 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    font-size: 16px; /* 16px prevents iOS zoom-on-focus */
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .login-card button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font-weight: 600; font-size: 16px;
    min-height: 44px;
  }
  .login-card button:active { opacity: 0.85; }
  .login-card button:disabled { opacity: 0.6; }
  .login-error { color: var(--fail); font-size: 13px; min-height: 18px; margin-bottom: 8px; }

  /* ---------- Runs list ---------- */
  .run {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    min-height: 44px;
  }
  .run:active { background: var(--bg-elev); }
  .run .dot { flex: 0 0 auto; width: 10px; height: 10px; border-radius: 50%; margin-top: 2px; }
  .run.succeeded .dot { background: var(--ok); }
  .run.failed .dot { background: var(--fail); }
  .run.running .dot { background: var(--running); animation: pulse 1.4s ease-in-out infinite; }
  .run.no_changes .dot { background: var(--none); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .run .meta { flex: 1 1 auto; min-width: 0; }
  .run .repo { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run .issue { color: var(--text-dim); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run .badge { flex: 0 0 auto; font-size: 12px; color: var(--text-dim); text-align: right; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .cancel-btn {
    padding: 4px 10px; border: 1px solid var(--fail); border-radius: 6px;
    background: transparent; color: var(--fail); font-size: 11px; font-weight: 600;
    white-space: nowrap; min-height: 28px;
  }
  .cancel-btn:active { background: rgba(248,81,73,0.15); }
  .cancel-btn:disabled { opacity: 0.5; cursor: default; }
  .list-empty { padding: 60px 24px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .list-empty .emoji { font-size: 36px; display: block; margin-bottom: 8px; }

  /* ---------- Chat ---------- */
  .chat-status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 16px 0; font-size: 12px; color: var(--text-dim);
  }
  .chat-status-bar .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .msg-list { padding: 12px 12px 0; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; max-width: 88%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .bubble {
    padding: 9px 13px; border-radius: 16px; font-size: 15px;
    white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word;
  }
  .msg.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 5px; }
  .msg.assistant .bubble { background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .msg .avatar { flex: 0 0 auto; width: 26px; height: 26px; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; }
  .msg.assistant .avatar { margin-right: 7px; }
  .msg.user .avatar { display: none; }
  .msg-row { display: flex; align-items: flex-end; gap: 0; }
  .msg.assistant .msg-row { flex-direction: row; }

  /* Tool call + result chips: compact, monospace, expandable. */
  .tool {
    align-self: flex-start; width: 100%; max-width: 92%;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
    font-size: 13px; overflow: hidden;
  }
  .tool-head {
    display: flex; align-items: center; gap: 8px; padding: 9px 12px;
    color: var(--text-dim);
  }
  .tool-head .ico { font-size: 14px; }
  .tool-head .label { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-head .count { font-size: 12px; opacity: 0.8; }
  .tool-head .chev { font-size: 12px; transition: transform 0.15s; }
  .tool.open .chev { transform: rotate(90deg); }
  .tool-body {
    display: none; padding: 0 12px 10px; border-top: 1px solid var(--border);
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px; color: var(--text-dim); white-space: pre-wrap; overflow-wrap: break-word;
    margin-top: 6px; padding-top: 10px;
  }
  .tool.open .tool-body { display: block; }
  .tool-result { font-size: 12px; color: var(--text-dim); }
  .tool-result .bubble { background: transparent; border: 1px dashed var(--border); padding: 8px 11px; font-size: 12px; max-height: 200px; overflow-y: auto; }
  .tool-result .cropped { display: -webkit-box; -webkit-line-clamp: 6; line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
  .tool-result .more-link { color: var(--accent); font-size: 12px; margin-top: 4px; display: inline-block; }

  .run-summary {
    margin: 8px 12px 16px; padding: 12px 14px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
    font-size: 13px;
  }
  .run-summary .row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
  .run-summary .k { color: var(--text-dim); }
  .run-summary a { color: var(--accent); text-decoration: none; word-break: break-all; }

  /* ---------- Loading + errors ---------- */
  .center-msg { text-align: center; padding: 60px 24px; color: var(--text-dim); font-size: 14px; }
  .err-banner { margin: 12px; padding: 12px; background: rgba(248,81,73,0.1); border: 1px solid var(--fail); border-radius: 10px; color: var(--fail); font-size: 13px; }

  /* ---------- Bottom tab nav (Runs | Crons) ---------- */
  .tab-nav {
    flex: 0 0 auto; display: flex; gap: 0;
    background: var(--bg-elev); border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom);
  }
  .tab-nav button {
    flex: 1 1 0; min-height: 48px; background: transparent; border: none;
    color: var(--text-dim); font-size: 13px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 4px;
  }
  .tab-nav button.active { color: var(--accent); }
  .tab-nav button .tab-ico { font-size: 18px; }

  /* ---------- Cron list rows ---------- */
  .cron-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--border); min-height: 44px;
  }
  .cron-row:active { background: var(--bg-elev); }
  .cron-row .dot { flex: 0 0 auto; width: 10px; height: 10px; border-radius: 50%; margin-top: 2px; }
  .cron-row.enabled .dot { background: var(--ok); }
  .cron-row.disabled .dot { background: var(--none); }
  .cron-row .meta { flex: 1 1 auto; min-width: 0; }
  .cron-row .name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cron-row .schedule { color: var(--text-dim); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---------- Cron detail / form ---------- */
  .form-card { padding: 16px; }
  .form-card .field { margin-bottom: 14px; }
  .form-card label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
  .form-card input, .form-card textarea, .form-card select {
    width: 100%; padding: 11px 13px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    font-size: 16px; font-family: inherit;
  }
  .form-card input:focus, .form-card textarea:focus, .form-card select:focus { outline: none; border-color: var(--accent); }
  .form-card textarea { min-height: 90px; resize: vertical; font-family: inherit; }
  .form-card .hint { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .form-card .hint code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: var(--bg-elev2); padding: 1px 5px; border-radius: 4px; }
  .form-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .btn {
    flex: 1 1 auto; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 15px;
    border: 1px solid var(--border); background: var(--bg-elev2); color: var(--text); min-height: 44px;
  }
  .btn:active { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.danger { border-color: var(--fail); color: var(--fail); }
  .btn.danger:active { background: rgba(248,81,73,0.12); }
  .section-label { padding: 14px 16px 6px; font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <section id="login-view">
    <form class="login-card" id="login-form" autocomplete="on">
      <div class="logo">🍜</div>
      <h1>Noodle</h1>
      <p>Sign in to view agent runs</p>
      <div class="login-error" id="login-error" role="alert"></div>
      <input type="password" name="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" id="login-btn">Sign in</button>
    </form>
  </section>

  <!-- RUNS LIST -->
  <section id="runs-view" class="hidden">
    <div class="topbar">
      <span class="emoji">🍜</span>
      <span class="title">Runs</span>
      <button class="icon-btn" id="refresh-runs" title="Refresh" aria-label="Refresh">↻</button>
      <button class="icon-btn" id="logout-btn" title="Sign out" aria-label="Sign out">⎋</button>
    </div>
    <div class="scroll" id="runs-scroll">
      <div id="runs-list"></div>
    </div>
    <nav class="tab-nav">
      <button id="tab-runs" class="active"><span class="tab-ico">▶</span>Runs</button>
      <button id="tab-crons"><span class="tab-ico">⏰</span>Crons</button>
    </nav>
  </section>

  <!-- CRONS LIST -->
  <section id="crons-view" class="hidden">
    <div class="topbar">
      <span class="emoji">⏰</span>
      <span class="title">Crons</span>
      <button class="icon-btn" id="new-cron-btn" title="New cron" aria-label="New cron">+</button>
      <button class="icon-btn" id="refresh-crons" title="Refresh" aria-label="Refresh">↻</button>
    </div>
    <div class="scroll" id="crons-scroll">
      <div id="crons-list"></div>
    </div>
    <nav class="tab-nav">
      <button id="tab-runs-2"><span class="tab-ico">▶</span>Runs</button>
      <button id="tab-crons-2" class="active"><span class="tab-ico">⏰</span>Crons</button>
    </nav>
  </section>

  <!-- CRON DETAIL / EDIT -->
  <section id="cron-detail-view" class="hidden">
    <div class="topbar">
      <button class="icon-btn" id="cron-back-btn" title="Back" aria-label="Back">‹</button>
      <span class="title" id="cron-detail-title">Cron</span>
      <button class="icon-btn" id="refresh-cron-detail" title="Refresh" aria-label="Refresh">↻</button>
    </div>
    <div class="scroll" id="cron-detail-scroll">
      <div id="cron-form-area"></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chat-view" class="hidden">
    <div class="topbar">
      <button class="icon-btn" id="back-btn" title="Back" aria-label="Back">‹</button>
      <span class="title" id="chat-title">Run</span>
      <button class="cancel-btn hidden" id="chat-cancel-btn">Cancel</button>
      <button class="icon-btn" id="refresh-chat" title="Refresh" aria-label="Refresh">↻</button>
    </div>
    <div class="scroll" id="chat-scroll">
      <div id="chat-status" class="chat-status-bar"></div>
      <div class="msg-list" id="msg-list"></div>
      <div id="run-summary"></div>
    </div>
  </section>

</div>

<script>
"use strict";
// Single-file SPA: three views (login / runs / chat) swapped by show().
// All API calls use credentials: "same-origin" so the signed cookie is sent.
// A 401 anywhere bounces back to the login view. No router, no framework.

const $ = (id) => document.getElementById(id);
const views = ["login-view", "runs-view", "crons-view", "cron-detail-view", "chat-view"];
let currentRunId = null;
let currentCronId = null;
let profiles = [];        // fetched profile names for the dropdown
let defaultProfile = "";

function show(view) {
  for (const v of views) $(v).classList.toggle("hidden", v !== view);
}

async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: "same-origin", ...opts });
  if (res.status === 401) { showLogin(); throw new Error("unauthorized"); }
  return res;
}
function showLogin() {
  show("login-view");
  $("login-error").textContent = "";
  $("login-password").value = "";
  $("login-password").focus();
}

// ---------- Login ----------
$("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("login-btn");
  const err = $("login-error");
  err.textContent = "";
  btn.disabled = true;
  try {
    const pw = $("login-password").value;
    const res = await fetch("/api/login", {
      method: "POST",
      credentials: "same-origin",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (res.status === 401) { err.textContent = "Wrong password"; return; }
    if (!res.ok) throw new Error("login failed");
    $("login-password").value = "";
    await openRuns();
  } catch (ex) {
    err.textContent = "Could not reach server";
  } finally {
    btn.disabled = false;
  }
});

$("logout-btn").addEventListener("click", async () => {
  await fetch("/api/logout", { method: "POST", credentials: "same-origin" }).catch(() => {});
  showLogin();
});

// ---------- Runs list ----------
function statusText(s) {
  return ({ succeeded: "ok", failed: "fail", running: "running", no_changes: "no changes" })[s] || s;
}

async function openRuns() {
  show("runs-view");
  $("runs-list").innerHTML = '<div class="center-msg">Loading…</div>';
  try {
    const res = await api("/api/runs");
    const body = await res.json();
    renderRuns(body.runs || []);
  } catch {
    $("runs-list").innerHTML = '<div class="center-msg">Could not load runs.</div>';
  }
}

function renderRuns(runs) {
  const el = $("runs-list");
  if (runs.length === 0) {
    el.innerHTML = '<div class="list-empty"><span class="emoji">🍜</span>No runs yet.</div>';
    return;
  }
  el.innerHTML = "";
  for (const r of runs) {
    const row = document.createElement("div");
    row.className = "run " + r.status;
    const repoName = r.repo.split("/").pop() || r.repo;
    row.innerHTML =
      '<div class="dot"></div>' +
      '<div class="meta">' +
        '<div class="repo"></div>' +
        '<div class="issue"></div>' +
      '</div>' +
      '<div class="badge"></div>';
    row.querySelector(".repo").textContent = repoName + " #" + r.issue;
    row.querySelector(".issue").textContent = r.repo;
    const badge = row.querySelector(".badge");
    badge.textContent = statusText(r.status);
    if (r.status === "running") {
      const btn = document.createElement("button");
      btn.className = "cancel-btn";
      btn.textContent = "Cancel";
      btn.addEventListener("click", (e) => { e.stopPropagation(); cancelRun(r.job_id, btn); });
      badge.appendChild(btn);
    }
    row.addEventListener("click", () => openChat(r.job_id));
    el.appendChild(row);
  }
}

$("refresh-runs").addEventListener("click", openRuns);

// ---------- Crons ----------
async function ensureProfiles() {
  if (profiles.length) return;
  try {
    const res = await api("/api/profiles");
    const body = await res.json();
    profiles = body.profiles || [];
    defaultProfile = body.default || "";
  } catch { /* leave empty — dropdown shows default only */ }
}

async function openCrons() {
  show("crons-view");
  $("crons-list").innerHTML = '<div class="center-msg">Loading…</div>';
  try {
    const res = await api("/api/crons");
    const body = await res.json();
    renderCrons(body.crons || []);
  } catch {
    $("crons-list").innerHTML = '<div class="center-msg">Could not load crons.</div>';
  }
}

function cronScheduleText(expr) {
  // Lightweight humanizer for the common cases; falls back to the raw expr.
  const m = expr.trim().split(/\s+/);
  if (m.length === 5) {
    const [min, hr, dom, mon, dow] = m;
    if (min === "0" && hr !== "*" && dom === "*" && mon === "*" && dow === "*") {
      const h = parseInt(hr, 10);
      const ampm = h < 12 ? "AM" : "PM";
      const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
      return `Daily at ${String(h12).padStart(2,"0")}:00 ${ampm}`;
    }
    if (min === "0" && hr === "0" && dom === "*" && mon === "*" && dow === "0-6") return "Daily at 12:00 AM";
    if (min === "0" && hr === "0" && dom === "*" && mon === "*" && dow === "1-5") return "Weekdays at 12:00 AM";
    if (min === "0" && hr === "*" && dom === "*" && mon === "*" && dow === "*") return "Every hour";
    if (/^\*\//.test(min)) return `Every ${min.slice(2)} minutes`;
    if (/^\*\//.test(hr)) return `Every ${hr.slice(2)} hours`;
  }
  return expr;
}

function renderCrons(crons) {
  const el = $("crons-list");
  if (crons.length === 0) {
    el.innerHTML = '<div class="list-empty"><span class="emoji">⏰</span>No crons yet. Tap + to add one.</div>';
    return;
  }
  el.innerHTML = "";
  for (const c of crons) {
    const row = document.createElement("div");
    row.className = "cron-row " + (c.enabled ? "enabled" : "disabled");
    row.innerHTML =
      '<div class="dot"></div>' +
      '<div class="meta">' +
        '<div class="name"></div>' +
        '<div class="schedule"></div>' +
      '</div>';
    row.querySelector(".name").textContent = c.name;
    row.querySelector(".schedule").textContent =
      cronScheduleText(c.cron_expression) + " · " + c.repo;
    row.addEventListener("click", () => openCronDetail(c.id));
    el.appendChild(row);
  }
}

$("refresh-crons").addEventListener("click", openCrons);
$("new-cron-btn").addEventListener("click", () => openCronDetail(null));
$("tab-crons").addEventListener("click", openCrons);
$("tab-crons-2").addEventListener("click", openCrons);
$("tab-runs").addEventListener("click", openRuns);
$("tab-runs-2").addEventListener("click", openRuns);
$("cron-back-btn").addEventListener("click", () => { currentCronId = null; openCrons(); });
$("refresh-cron-detail").addEventListener("click", () => { if (currentCronId) openCronDetail(currentCronId); });

async function openCronDetail(id) {
  currentCronId = id;
  show("cron-detail-view");
  $("cron-form-area").innerHTML = '<div class="center-msg">Loading…</div>';
  $("cron-detail-title").textContent = id ? "Edit Cron" : "New Cron";
  await ensureProfiles();

  let cron = null;
  let runs = [];
  if (id) {
    try {
      const res = await api("/api/crons/" + encodeURIComponent(id));
      const body = await res.json();
      cron = body.cron;
      runs = body.runs || [];
    } catch {
      $("cron-form-area").innerHTML = '<div class="center-msg">Could not load cron.</div>';
      return;
    }
  }
  renderCronForm(cron, runs);
}

function renderCronForm(cron, runs) {
  const isNew = !cron;
  const c = cron || { name: "", repo: "", prompt: "", branch_name: "", cron_expression: "0 0 * * *", profile: null, enabled: 1 };
  const el = $("cron-form-area");
  el.innerHTML = "";

  const card = document.createElement("div");
  card.className = "form-card";
  card.innerHTML =
    '<div class="field"><label for="cf-name">Name</label>' +
      '<input id="cf-name" type="text" value="' + escAttr(c.name) + '" placeholder="e.g. Bug sweep"></div>' +
    '<div class="field"><label for="cf-repo">Repository</label>' +
      '<input id="cf-repo" type="text" value="' + escAttr(c.repo) + '" placeholder="owner/name"></div>' +
    '<div class="field"><label for="cf-branch">Branch</label>' +
      '<input id="cf-branch" type="text" value="' + escAttr(c.branch_name) + '" placeholder="e.g. wa-agent">' +
      '<div class="hint">The agent commits here each run. Reused across runs.</div></div>' +
    '<div class="field"><label for="cf-expr">Schedule (cron)</label>' +
      '<input id="cf-expr" type="text" value="' + escAttr(c.cron_expression) + '" placeholder="0 0 * * *">' +
      '<div class="hint" id="cf-expr-hint"></div></div>' +
    '<div class="field"><label for="cf-profile">Profile</label>' +
      '<select id="cf-profile"><option value="">Default</option></select>' +
      '<div class="hint">Which model the cron runs on.</div></div>' +
    '<div class="field"><label for="cf-prompt">Prompt / Instructions</label>' +
      '<textarea id="cf-prompt" placeholder="e.g. Find bugs in the codebase and open an issue for each one.">' + escHtml(c.prompt) + '</textarea></div>' +
    '<div id="cf-error" class="err-banner hidden"></div>' +
    '<div class="form-actions">' +
      '<button class="btn primary" id="cf-save">' + (isNew ? "Create" : "Save") + '</button>' +
      (isNew ? "" : '<button class="btn" id="cf-run">Run Now</button>') +
      (isNew ? "" : '<button class="btn" id="cf-toggle">' + (c.enabled ? "Disable" : "Enable") + '</button>') +
      (isNew ? "" : '<button class="btn danger" id="cf-delete">Delete</button>') +
    '</div>';
  el.appendChild(card);

  // Populate the profile dropdown.
  const sel = $("cf-profile");
  for (const p of profiles) {
    const opt = document.createElement("option");
    opt.value = p; opt.textContent = p + (p === defaultProfile ? " (default)" : "");
    sel.appendChild(opt);
  }
  if (c.profile) sel.value = c.profile;

  // Live schedule preview.
  const exprInput = $("cf-expr");
  const hintEl = $("cf-expr-hint");
  const updateHint = () => { hintEl.innerHTML = "Runs: <code>" + escHtml(cronScheduleText(exprInput.value)) + "</code>"; };
  exprInput.addEventListener("input", updateHint);
  updateHint();

  // Save (create or update).
  $("cf-save").addEventListener("click", async () => {
    const payload = {
      name: $("cf-name").value.trim(),
      repo: $("cf-repo").value.trim(),
      branch_name: $("cf-branch").value.trim(),
      cron_expression: $("cf-expr").value.trim(),
      profile: $("cf-profile").value || null,
      prompt: $("cf-prompt").value,
    };
    const errEl = $("cf-error");
    errEl.classList.add("hidden");
    try {
      const res = await api("/api/crons" + (isNew ? "" : "/" + encodeURIComponent(cron.id)), {
        method: isNew ? "POST" : "PATCH",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
      });
      const body = await res.json();
      if (!res.ok) { errEl.textContent = body.error || "Save failed"; errEl.classList.remove("hidden"); return; }
      // After create/edit, open the saved cron's detail.
      await openCronDetail(body.cron.id);
    } catch {
      errEl.textContent = "Could not reach server"; errEl.classList.remove("hidden");
    }
  });

  if (!isNew) {
    $("cf-run").addEventListener("click", async (e) => {
      const btn = e.currentTarget;
      btn.disabled = true; btn.textContent = "Queuing…";
      try {
        const res = await api("/api/crons/" + encodeURIComponent(cron.id) + "/run", { method: "POST" });
        if (!res.ok) { const b = await res.json().catch(() => ({})); btn.textContent = b.error || "Failed"; btn.disabled = false; return; }
        btn.textContent = "Queued ✓";
        setTimeout(() => { btn.textContent = "Run Now"; btn.disabled = false; }, 2000);
      } catch { btn.textContent = "Error"; btn.disabled = false; }
    });

    $("cf-toggle").addEventListener("click", async (e) => {
      const btn = e.currentTarget;
      const enable = btn.textContent.trim() === "Enable";
      try {
        const res = await api("/api/crons/" + encodeURIComponent(cron.id), {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ enabled: enable ? 1 : 0 }),
        });
        if (res.ok) { btn.textContent = enable ? "Disable" : "Enable"; }
      } catch { /* ignore */ }
    });

    $("cf-delete").addEventListener("click", async () => {
      if (!confirm("Delete this cron? Run history is kept.")) return;
      try {
        await api("/api/crons/" + encodeURIComponent(cron.id), { method: "DELETE" });
        await openCrons();
      } catch { /* ignore */ }
    });

    // Recent runs for this cron (reuses the .run row pattern).
    if (runs.length > 0) {
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "Recent runs";
      el.appendChild(label);
      const list = document.createElement("div");
      for (const r of runs) {
        const row = document.createElement("div");
        row.className = "run " + r.status;
        const repoName = r.repo.split("/").pop() || r.repo;
        row.innerHTML =
          '<div class="dot"></div>' +
          '<div class="meta"><div class="repo"></div><div class="issue"></div></div>' +
          '<div class="badge"></div>';
        row.querySelector(".repo").textContent = repoName;
        row.querySelector(".issue").textContent = fmtTime(r.started_at);
        row.querySelector(".badge").textContent = statusText(r.status);
        row.addEventListener("click", () => openChat(r.job_id));
        list.appendChild(row);
      }
      el.appendChild(list);
    }
  }
}

async function cancelRun(jobId, btn) {
  btn.disabled = true;
  btn.textContent = "Cancelling…";
  try {
    const res = await api("/api/runs/" + encodeURIComponent(jobId) + "/cancel", { method: "POST" });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      btn.textContent = body.error || "Failed";
      btn.disabled = false;
      return;
    }
    // Refresh the list to reflect the updated status.
    await openRuns();
  } catch {
    btn.textContent = "Error";
    btn.disabled = false;
  }
}

// ---------- Chat ----------
async function openChat(jobId) {
  currentRunId = jobId;
  show("chat-view");
  $("msg-list").innerHTML = '<div class="center-msg">Loading…</div>';
  $("run-summary").innerHTML = "";
  $("chat-title").textContent = "Run";
  await loadChat(jobId);
}

async function loadChat(jobId) {
  try {
    const res = await api("/api/runs/" + encodeURIComponent(jobId));
    const body = await res.json();
    renderChat(body.run, body.messages || []);
  } catch {
    $("msg-list").innerHTML = '<div class="center-msg">Could not load run.</div>';
  }
}

function renderChat(run, messages) {
  const issuePart = run.issue != null ? " #" + run.issue : (run.cron_job_id ? " (cron)" : "");
  $("chat-title").textContent = (run.repo.split("/").pop() || run.repo) + issuePart;

  // Show cancel button only for running jobs.
  const cancelBtn = $("chat-cancel-btn");
  if (run.status === "running") {
    cancelBtn.classList.remove("hidden");
    cancelBtn.disabled = false;
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = async () => {
      cancelBtn.disabled = true;
      cancelBtn.textContent = "Cancelling…";
      try {
        const res = await api("/api/runs/" + encodeURIComponent(run.job_id) + "/cancel", { method: "POST" });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          cancelBtn.textContent = body.error || "Failed";
          cancelBtn.disabled = false;
          return;
        }
        await loadChat(run.job_id);
      } catch {
        cancelBtn.textContent = "Error";
        cancelBtn.disabled = false;
      }
    };
  } else {
    cancelBtn.classList.add("hidden");
  }

  const statusEl = $("chat-status");
  const colors = { succeeded: "var(--ok)", failed: "var(--fail)", running: "var(--running)", no_changes: "var(--none)" };
  statusEl.innerHTML = '<span class="dot" style="background:' + (colors[run.status] || "var(--none)") + '"></span>' +
    statusText(run.status) + (run.model ? " · " + escHtml(run.model) : "");

  const list = $("msg-list");
  list.innerHTML = "";

  if (messages.length === 0) {
    list.innerHTML = '<div class="center-msg">No conversation recorded.</div>';
  } else {
    for (const m of messages) {
      if (m.role === "toolResult") {
        list.appendChild(renderToolResult(m));
      } else {
        list.appendChild(renderMessage(m));
      }
    }
    // Scroll to bottom so the latest turn is visible.
    requestAnimationFrame(() => { $("chat-scroll").scrollTop = $("chat-scroll").scrollHeight; });
  }

  renderSummary(run);
}

function renderMessage(m) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + m.role;

  if (m.role === "assistant") {
    // Avatar + bubble inside a row so they align at the bottom.
    const row = document.createElement("div");
    row.className = "msg-row";
    const av = document.createElement("span");
    av.className = "avatar";
    av.textContent = "🍜";
    row.appendChild(av);

    if (m.text && m.text.trim()) {
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.textContent = m.text;
      row.appendChild(bub);
    }
    wrap.appendChild(row);

    // Tool calls render as expandable chips beneath the text.
    if (m.toolCalls) {
      for (const tc of m.toolCalls) wrap.appendChild(renderToolCall(tc));
    }
    return wrap;
  }

  // user
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.textContent = m.text;
  wrap.appendChild(bub);
  return wrap;
}

function summarizeArgs(name, args) {
  // One-line preview for the collapsed chip label.
  if (name === "read" || name === "edit" || name === "write") {
    const p = args.path || "";
    return p.split(/[/\\]/).pop() || p || name;
  }
  if (name === "bash") return String(args.command || "").slice(0, 60).trim() || "bash";
  if (name === "grep" || name === "glob") return String(args.pattern || args.path || name);
  return name;
}

function renderToolCall(tc) {
  const tool = document.createElement("div");
  tool.className = "tool";
  const head = document.createElement("div");
  head.className = "tool-head";
  head.innerHTML =
    '<span class="ico">🔧</span>' +
    '<span class="label"></span>' +
    '<span class="chev">▸</span>';
  head.querySelector(".label").textContent = summarizeArgs(tc.name, tc.args);

  const body = document.createElement("div");
  body.className = "tool-body";
  const pre = document.createElement("div");
  pre.textContent = JSON.stringify(tc.args, null, 2);
  body.appendChild(pre);

  head.addEventListener("click", () => tool.classList.toggle("open"));
  tool.appendChild(head);
  tool.appendChild(body);
  return tool;
}

function renderToolResult(m) {
  const wrap = document.createElement("div");
  wrap.className = "msg assistant tool-result";
  const bub = document.createElement("div");
  bub.className = "bubble cropped";
  bub.textContent = "↳ " + m.toolName + ": " + m.text;

  const more = document.createElement("span");
  more.className = "more-link";
  more.textContent = "show more";
  more.addEventListener("click", () => {
    bub.classList.toggle("cropped");
    more.textContent = bub.classList.contains("cropped") ? "show more" : "show less";
  });
  // Defer the "show more" link: only render if the text is long enough to crop.
  wrap.appendChild(bub);
  if (m.text.length > 200) wrap.appendChild(more);
  return wrap;
}

function renderSummary(run) {
  const el = $("run-summary");
  const rows = [];
  rows.push(["Repo", run.repo]);
  if (run.branch) rows.push(["Branch", run.branch]);
  if (run.profile) rows.push(["Profile", run.profile]);
  rows.push(["Started", fmtTime(run.started_at)]);
  if (run.finished_at) rows.push(["Finished", fmtTime(run.finished_at)]);
  if (run.pr_url) rows.push(["PR", '<a href="' + escAttr(run.pr_url) + '" target="_blank" rel="noopener">' + escHtml(run.pr_url) + "</a>"]);

  let html = "";
  for (const [k, v] of rows) {
    html += '<div class="row"><span class="k">' + escHtml(k) + '</span><span style="text-align:right">' + v + "</span></div>";
  }
  if (run.error) {
    html += '<div class="row" style="margin-top:8px;color:var(--fail)"><span class="k">Error</span><span>' + escHtml(run.error) + "</span></div>";
  }
  if (run.summary) {
    html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)"><div class="k" style="margin-bottom:4px">Summary</div><div>' + escHtml(run.summary) + "</div></div>";
  }
  el.innerHTML = html ? '<div class="run-summary">' + html + "</div>" : "";
}

// ---------- Helpers ----------
function escHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escAttr(s) { return escHtml(s); }
function fmtTime(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso + (iso.endsWith("Z") ? "" : "Z"));
    return d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  } catch { return iso; }
}

// ---------- Nav ----------
// Back from chat returns to the view that opened it (runs list or cron detail).
$("back-btn").addEventListener("click", () => {
  currentRunId = null;
  if (currentCronId) { openCronDetail(currentCronId); }
  else { openRuns(); }
});
$("refresh-chat").addEventListener("click", () => { if (currentRunId) loadChat(currentRunId); });

// ---------- Boot: probe auth, open the right view ----------
(async function init() {
  try {
    const res = await fetch("/api/runs", { credentials: "same-origin" });
    if (res.ok) { await openRuns(); }
    else { showLogin(); }
  } catch {
    showLogin();
  }
})();
</script>
