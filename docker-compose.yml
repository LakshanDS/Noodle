services:
  noodle:
    image: ghcr.io/lakshands/noodle-agent:latest
    container_name: noodle-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - noodle-data:/data
      - ./noodle.config.yaml:/app/noodle.config.yaml:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  noodle-data:
