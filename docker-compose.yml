services:
  noodle:
    image: ghcr.io/lakshands/noodle:latest
    container_name: noodle-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - noodle-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  noodle-data:
