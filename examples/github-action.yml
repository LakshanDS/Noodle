# Example: run Noodle as a GitHub Action in your own repo.
#
# Drop this at .github/workflows/noodle.yml in the repo you want Noodle to
# work on. It runs Noodle on its own runner — no server to host. The runner
# spins up on a trigger, does the job, and shuts down.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   GITHUB_TOKEN      — provided automatically by GitHub (default token).
#   ANTHROPIC_API_KEY — or whichever LLM provider key(s) your profiles use.
#
# Also commit a `noodle.config.yaml` to the repo root defining your profiles
# and routing. See noodle.config.example.yaml in this repo for a template.

name: Noodle

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

# Prevent two runs racing on the same issue.
concurrency:
  group: noodle-${{ github.event.issue.number }}
  cancel-in-progress: false

# Permissions for the default GITHUB_TOKEN — enough to clone, push a branch,
# open a PR, and comment on the issue. Add `id-token: write` only if you need
# OIDC. NOTE: PRs opened by the default token will NOT trigger downstream
# `on: pull_request` workflows (standard GitHub limitation). Use a PAT or a
# GitHub App if you need that.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  noodle:
    # Run on new/reopened issues, or on comments that wake the agent:
    #   /noodle    — slash command
    #   @noodle    — @mention (also matches @noodle-agent, @noodle[bot])
    #   #<profile> — selects a profile AND wakes (e.g. #claude)
    # Noodle also gates internally on the wake signal (config.triggers), so this
    # `if:` is a fast path to skip spinning up the job at all.
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body, '/noodle') ||
        contains(github.event.comment.body, '@noodle') ||
        contains(github.event.comment.body, '#claude') ||
        contains(github.event.comment.body, '#nim')
      ))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Noodle
        uses: LakshanDS/Noodle@v1
        with:
          # Both inputs are optional — Noodle reads them from the event.
          # Set them only if you want to override.
          # issue: ${{ github.event.issue.number }}
          # repo:  ${{ github.repository }}
          config: noodle.config.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add whichever provider keys your profiles reference.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          # OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          # GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          # GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          # DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
