# Noodle configuration.
# Copy to `noodle.config.yaml` and edit. Secrets live in `.env`, not here.

# Default profile used when no routing rule matches an issue.
default_profile: cheap

# Agent profiles. Each pins a model (via @earendil-works/pi-ai) and a tool set.
# `provider` + `model` select the model. `base_url` overrides the endpoint
# (for local / OpenAI-compatible servers like Ollama).
profiles:
  claude:
    provider: anthropic
    model: claude-sonnet-4-20250514
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

  cheap:
    provider: openrouter
    model: anthropic/claude-3-5-haiku
    thinking_level: "off"
    tools: [read, grep, find, ls]

  openai:
    provider: openai
    model: gpt-4o-mini
    thinking_level: "off"
    tools: [read, bash, edit, write, grep, find, ls]

  # Example local model. Requires LOCAL_BASE_URL in .env and a running server.
  local:
    provider: ollama
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:32b
    thinking_level: "off"
    tools: [read, bash, edit, write, grep, find, ls]

  # Any OpenAI-compatible endpoint: vLLM, LM Studio, DeepSeek, Cerebras, a proxy.
  # `api` picks the wire protocol; `api_key_env` is the env var holding the key
  # (omit it for no-auth local endpoints like Ollama).
  vllm:
    provider: vllm
    api: openai-completions
    base_url: http://localhost:8000/v1
    model: meta-llama/Llama-3.1-70B-Instruct
    api_key_env: VLLM_API_KEY        # optional for local no-auth servers
    context_window: 131072
    max_tokens: 32000
    thinking_level: "off"
    tools: [read, bash, edit, write, grep, find, ls]

  # Rate-limited provider example. Set api_rpm when a provider caps requests per
  # minute (e.g. NVIDIA NIM's free tier = 40). Noodle installs a pre-request
  # throttle so the agent loop never exceeds it. 0 = unlimited. Default: 30.
  nim:
    provider: nvidia
    api: openai-completions
    base_url: https://integrate.api.nvidia.com/v1
    model: minimaxai/minimax-m3
    api_key_env: NVIDIA_API_KEY
    api_rpm: 40
    context_window: 131072
    max_tokens: 8192
    thinking_level: "off"
    tools: [read, bash, edit, write, grep, find, ls]

  # Any Anthropic-protocol endpoint: a self-hosted proxy, Cloudflare/Fireworks
  # exposing the Anthropic messages shape, a corporate gateway.
  anthropic-proxy:
    provider: acme-llm
    api: anthropic-messages
    base_url: https://llm.internal.acme.corp
    model: our-finetune-v2
    api_key_env: ACME_LLM_KEY
    context_window: 200000
    max_tokens: 8192
    thinking_level: "off"
    tools: [read, bash, edit, write, grep, find, ls]

# Routing rules — evaluated top-to-bottom, first match wins.
# kind: slash    — a `/word` command in the issue body or a comment
# kind: label    — a label on the issue
# kind: keyword  — a regex matched against title + body
routing:
  - { kind: slash,   match: "/claude",      profile: claude }
  - { kind: slash,   match: "/opus",        profile: claude }
  - { kind: slash,   match: "/cheap",       profile: cheap }
  - { kind: label,   match: "agent:big",    profile: claude }
  - { kind: label,   match: "bug",          profile: cheap }
  - { kind: keyword, match: "refactor|architecture", profile: claude }

# Per-repo overrides (optional). Any top-level key can be overridden here.
repos:
  # owner/name:
  #   default_profile: claude

# --- Phase 2: webhook server + scheduler (all optional) ---------------------
# These only matter when running `noodle serve`. Leave them out for Phase 1
# CLI-only usage (the existing `noodle run --repo … --issue …` flow is unchanged).

# HTTP server that receives GitHub webhooks.
# server:
#   host: 0.0.0.0
#   port: 3000

# Where the SQLite job queue + scan state live.
# storage:
#   sqlite_path: ./noodle.db

# Periodic cron scan. Every `interval_minutes`, Noodle polls each repo in
# `repos` for open issues updated since the last scan, routes each through the
# rules above, and enqueues any that match. Disabled by default.
# scheduler:
#   enabled: false
#   interval_minutes: 30
#   repos:
#     - owner/name
