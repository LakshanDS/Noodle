# Noodle configuration.
# Copy to `noodle.config.yaml` and edit. Secrets live in `.env`, not here.

# Display name used in issue labels, comments, PR bodies, branch names, slash
# command, and every other user-facing string. Change this to rebrand the agent.
agent_name: Noodle

# Default profile used when no routing rule matches an issue.
default_profile: cheap

# Agent profiles. Each pins a model (via @earendil-works/pi-ai) and a tool set.
# `provider` + `model` select the model. `base_url` overrides the endpoint
# (for local / OpenAI-compatible servers like Ollama).
#
# `thinking_level` controls how much the model "reasons" before answering.
# Built-in reasoning models (Anthropic Claude w/ thinking, OpenAI o-series,
# gpt-5) honor it; non-reasoning models (gpt-4o, haiku, etc.) silently ignore
# it. Default everywhere below is "medium". Custom endpoints must ALSO set
# `reasoning: true` for the level to take effect.
profiles:
  claude:
    provider: anthropic
    model: claude-sonnet-4-20250514
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

  cheap:
    provider: openrouter
    model: anthropic/claude-3-5-haiku
    thinking_level: medium
    tools: [read, grep, find, ls]

  openai:
    provider: openai
    model: gpt-4o-mini
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

  # Example local model. Requires LOCAL_BASE_URL in .env and a running server.
  local:
    provider: ollama
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:32b
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

  # Any OpenAI-compatible endpoint: vLLM, LM Studio, DeepSeek, Cerebras, a proxy.
  # `api` picks the wire protocol; `api_key_env` is the env var holding the key
  # (omit it for no-auth local endpoints like Ollama).
  # `*_price` fields are USD per 1M tokens — set them to your provider's published
  # rates so the run footer reports real cost (pi computes it automatically).
  # `cache_read_price` / `cache_write_price` only matter for providers that
  # support prompt caching (e.g. an Anthropic-protocol proxy); leave 0 otherwise.
  # `reasoning: true` opts the endpoint into thinking_level forwarding — set it
  # only when the underlying model is reasoning-capable (DeepSeek-R1, Qwen3,
  # o-series proxy) and speaks a format pi-ai recognizes.
  vllm:
    provider: vllm
    api: openai-completions
    base_url: http://localhost:8000/v1
    model: meta-llama/Llama-3.1-70B-Instruct
    api_key_env: VLLM_API_KEY        # optional for local no-auth servers
    context_window: 131072
    max_tokens: 32000
    input_token_price: 0.90          # USD per 1M input tokens
    output_token_price: 0.90         # USD per 1M output tokens
    # cache_read_price: 0.09         # only if the endpoint supports caching
    # cache_write_price: 1.13
    # reasoning: true                # only for reasoning-capable models
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

  # Rate-limited provider example. Set api_rpm when a provider caps requests per
  # minute (e.g. NVIDIA NIM's free tier = 40). Noodle installs a pre-request
  # throttle so the agent loop never exceeds it. 0 = unlimited. Default: 30.
  #
  # Retry config (optional) controls how pi recovers from transient errors
  # after a request fails. Only the agent-level retry is configurable; pi's
  # HTTP layer keeps its own built-in retry (OpenAI SDK default).
  #   retry_max_attempts   — agent-level retries (whole turn re-run). Default: 5.
  #   retry_base_delay_ms  — backoff base (doubles each attempt). Default: 3000.
  # Set retry_base_delay_ms to at least 2× the api_rpm interval so a retried
  # turn doesn't land before the rate-limit window resets. For 40 rpm that's
  # ~1.5s interval → 3000ms base delay is a good match.
  #
  # max_concurrent (optional) caps how many jobs of THIS profile run at once.
  # Useful when profiles use separate API keys: set queue.concurrency to the
  # total pool size (e.g. 2), then max_concurrent per profile (e.g. 1 each) so
  # they run in parallel up to each key's budget without a single key being
  # split across N runs. Unset → limited only by the global queue.concurrency.
  nim:
    provider: nvidia
    api: openai-completions
    base_url: https://integrate.api.nvidia.com/v1
    model: minimaxai/minimax-m3
    api_key_env: NVIDIA_API_KEY
    api_rpm: 40
    retry_max_attempts: 5
    retry_base_delay_ms: 3000
    context_window: 131072
    max_tokens: 8192
    # max_concurrent: 1
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

  # Any Anthropic-protocol endpoint: a self-hosted proxy, Cloudflare/Fireworks
  # exposing the Anthropic messages shape, a corporate gateway.
  anthropic-proxy:
    provider: acme-llm
    api: anthropic-messages
    base_url: https://llm.internal.acme.corp
    model: our-finetune-v2
    api_key_env: ACME_LLM_KEY
    context_window: 200000
    max_tokens: 8192
    thinking_level: medium
    tools: [read, bash, edit, write, grep, find, ls]

# Routing rules — evaluated top-to-bottom, first match wins.
# kind: slash    — a `/word` command in the issue body or a comment
# kind: label    — a label on the issue
# kind: keyword  — a regex matched against title + body
routing:
  - { kind: slash,   match: "/claude",      profile: claude }
  - { kind: slash,   match: "/opus",        profile: claude }
  - { kind: slash,   match: "/cheap",       profile: cheap }
  - { kind: label,   match: "agent:big",    profile: claude }
  - { kind: label,   match: "bug",          profile: cheap }
  - { kind: keyword, match: "refactor|architecture", profile: claude }

# Per-repo overrides (optional). Any top-level key can be overridden here.
repos:
  # owner/name:
  #   default_profile: claude

# --- Phase 2: webhook server + scheduler (all optional) ---------------------
# These only matter when running `noodle serve`. Leave them out for Phase 1
# CLI-only usage (the existing `noodle run --repo … --issue …` flow is unchanged).

# HTTP server that receives GitHub webhooks.
# server:
#   host: 0.0.0.0
#   port: 3000

# Where the SQLite job queue + scan state live.
# storage:
#   sqlite_path: ./noodle.db

# Periodic cron scan. Every `interval_minutes`, Noodle polls each repo in
# `repos` for open issues updated since the last scan, routes each through the
# rules above, and enqueues any that match. Disabled by default.
# scheduler:
#   enabled: false
#   interval_minutes: 30
#   repos:
#     - owner/name

# --- Phase 3: run + queue hardening (all optional) --------------------------
# Both apply to `noodle serve` AND `noodle run` (the stall watcher guards CLI
# runs too). Defaults shown — omit a block to use them.

# Per-run controls.
# run:
#   # Abort a run that has emitted no agent activity (tool calls, turns, messages,
#   # compaction, retries) for this many minutes WHILE NO TOOL IS RUNNING. Silence
#   # while waiting on an LLM call usually means a dropped connection — catch it
#   # fast. A healthy long run emits events constantly. 0 disables it. Default: 15.
#   stall_timeout_minutes: 15
#   # Abort after this many minutes of silence WHILE A TOOL IS RUNNING. A bash
#   # command building/running tests legitimately produces no events until it
#   # writes output, so this must be larger than stall_timeout_minutes. A chatty
#   # build (which emits tool_execution_update constantly) never trips it; only a
#   # genuinely hung tool does. Falls back to stall_timeout_minutes when set to 0.
#   # Default: 60.
#   tool_stall_minutes: 60

# Job-queue behavior.
# queue:
#   # Max jobs running at once. Each holds a workspace + pi session in memory; on
#   # a small VPS keep this at 1. Raise only with headroom.
#   concurrency: 1
#   # Total attempts per job (1 = no retry). Retries skip permanent errors (auth,
#   # config, model-not-found) and stall timeouts; everything else (network blips,
#   # transient 5xx) is retried with exponential backoff. Pi retries 429s itself.
#   max_attempts: 3
#   # Base backoff seconds for retries. Doubles each attempt, capped at 10 min:
#   # attempt 1→60s, 2→120s, 3→240s, …
#   retry_backoff_seconds: 60

# --- Wake triggers (opt-in by default) --------------------------------------
# By default Noodle is opt-in: it ONLY runs an issue when the issue body or a
# comment carries an explicit wake signal. A bare new issue does NOT wake it.
# Wake signals (always honored regardless of this block):
#   @<agent>           mention, e.g. @noodle / @noodle-agent / @noodle[bot]
#   /<agent>            slash command, e.g. /noodle fix this
#   #<profile>          tag, e.g. #claude — also SELECTS that profile
#   assignment          assigning the issue to the agent
# triggers:
#   # Fire when body/comments @-mention the agent. Default: true.
#   trigger_on_mention: true
#   # Extra substrings (case-insensitive) that also wake the agent.
#   trigger_keywords: []
#   # Restore "fire on every new/reopened/labeled issue" (legacy behavior).
#   # Default: false. Set true to opt out of the mention/keyword filter entirely.
#   trigger_on_open: false

# --- API Relay (optional) ----------------------------------------------------
# Centralized rate-limiting relay. When enabled, all API calls from this process
# automatically route through the relay — no config changes needed. The relay
# enforces per-profile RPM limits, then forwards to each profile's base_url.
#
# When disabled (default), requests go directly to each profile's base_url.
#
# External agents (OpenCode CLI, etc.) can also use the relay by pointing their
# base_url to http://localhost:4445/v1 — the relay extracts the model from the
# request and applies the matching profile's rate limit.
#
# relay:
#   enabled: false
#   port: 4445
#   host: 0.0.0.0
