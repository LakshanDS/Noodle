name: Build & Deploy

# Build the Noodle Docker image, push it to GHCR, then SSH into the VPS and
# restart the single app container. The VPS holds only docker-compose.yml +
# .env + deploy.sh (no repo checkout), so the deploy job scp's a fresh
# docker-compose.yml over before running deploy.sh — that way the compose file
# on the host tracks the repo without a full git clone there. Triggers on pushes
# to master and can be run manually.

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Lowercase required by GHCR. Owner comes from the triggering repo.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the image name (GHCR rejects mixed-case paths).
      - name: Lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy when the VPS secrets are configured; otherwise just leave the
    # image in GHCR for manual pull.
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml + deploy.sh to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,deploy.sh"
          target: "/home/ubuntu/Noodle-Agent"
          overwrite: true

      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # GHCR auth is already configured persistently on the VPS (one-time
          # `docker login ghcr.io`), so we just run deploy.sh — it pulls the new
          # image, recreates the container via docker compose, and prunes.
          # chmod +x is belt-and-suspenders: scp may not preserve the exec bit.
          script: |
            cd /home/ubuntu/Noodle-Agent
            chmod +x deploy.sh
            ./deploy.sh
